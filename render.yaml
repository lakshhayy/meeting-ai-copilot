services:
  # 1. Main Node.js Express & React Web Service
  - type: web
    name: meeting-copilot-web
    env: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: meeting-copilot-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: meeting-copilot-redis
          property: connectionString
      - key: CLERK_SECRET_KEY
        sync: false # You will add this in the Render dashboard manually
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false 
      - key: VITE_API_URL
        # On Render, the app runs on the same domain for frontend and backend
        # E.g. https://your-render-app-name.onrender.com
        sync: false
      - key: OPENAI_API_KEY
        sync: false 
      - key: GROQ_API_KEY
        sync: false 
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  # 2. Redis Instance for Bull Queues (Audio Processing & AI Analysis)
  - type: redis
    name: meeting-copilot-redis
    plan: free # or starter
    ipAllowList: [] # internal connections only

databases:
  # 3. PostgreSQL Database
  - name: meeting-copilot-db
    databaseName: meeting_copilot
    user: db_admin
    plan: free # or starter
