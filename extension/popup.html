<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Meeting Co-pilot</title>
    <style>
      body { width: 300px; font-family: -apple-system, sans-serif; padding: 20px; background-color: #09090b; color: #fff; text-align: center; }
      h2 { margin-top: 0; font-size: 18px; font-weight: 600; }
      p { font-size: 13px; color: #a1a1aa; margin-bottom: 20px; }
      input[type="text"] { box-sizing: border-box; width: 100%; padding: 10px; margin-bottom: 12px; background: #18181b; border: 1px solid #27272a; color: white; border-radius: 6px; }
      button { box-sizing: border-box; width: 100%; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.2s; }
      button:hover { background: #1d4ed8; }
      button.recording { background: #ef4444; animation: pulse 2s infinite; }
      button.recording:hover { background: #dc2626; }
      @keyframes pulse { 0% { opacity: 1; box-shadow: 0 0 10px #ef4444; } 50% { opacity: 0.8; box-shadow: 0 0 0px #ef4444; } 100% { opacity: 1; box-shadow: 0 0 10px #ef4444; } }

      /* Mic toggle styles */
      .toggle-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; padding: 8px 12px; background: #18181b; border: 1px solid #27272a; border-radius: 6px; }
      .toggle-label { font-size: 13px; color: #d4d4d8; }
      .toggle-switch { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
      .toggle-switch input { opacity: 0; width: 0; height: 0; }
      .toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #3f3f46; border-radius: 22px; transition: 0.3s; }
      .toggle-slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; border-radius: 50%; transition: 0.3s; }
      .toggle-switch input:checked + .toggle-slider { background-color: #2563eb; }
      .toggle-switch input:checked + .toggle-slider:before { transform: translateX(18px); }
    </style>
  </head>
  <body>
    <h2>🎙️ Live Tab Audio</h2>
    <p>Capture this meeting natively without a bot.</p>
    
    <input type="text" id="workspaceId" placeholder="Paste Workspace ID here..." />

    <div class="toggle-row">
      <span class="toggle-label">🎤 Include my microphone</span>
      <label class="toggle-switch">
        <input type="checkbox" id="micToggle" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>

    <button id="toggleRecordBtn">Start Recording Tab</button>

    <script src="popup.js"></script>
  </body>
</html>
